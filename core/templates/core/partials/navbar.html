<header id="navbar" class="site-navbar">
    <div class="navbar">
        <div class="logo">
            <a href="{% url 'home' %}">
                BRUNU'S
            </a>
        </div>

        <nav class="nav-desktop" aria-label="Navegacao principal">
            <a href="{% url 'home' %}" class="nav-link">Home</a>
            <a href="{% url 'sobre' %}" class="nav-link">Sobre</a>
            <a href="{% url 'produtos' %}" class="nav-link">Produtos</a>
            {% if user.is_authenticated %}
            <a href="{% url 'minhas_compras' %}" class="nav-link">Compras</a>
            {% endif %}
            {% if user.is_staff %}
            <a href="{% url 'admin_itens' %}" class="nav-link">Admin</a>
            {% endif %}
        </nav>

        <div class="nav-actions">
            <form class="search-form" method="get" action="{% url 'produtos' %}" role="search">
                <input class="search-input" type="search" name="q" value="{{ search_query|default:'' }}"
                    placeholder="Pesquisar" aria-label="Pesquisar produtos">
                <button class="search-submit" type="submit" aria-label="Pesquisar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                </button>
            </form>

            {% if user.is_authenticated %}
            <a href="{% url 'logout' %}" class="icon-btn account-link" aria-label="Sair da conta">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20 21a8 8 0 0 0-16 0" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <span>Sair</span>
            </a>
            {% else %}
            <a href="{% url 'contato' %}" class="icon-btn account-link" aria-label="Entrar na conta">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20 21a8 8 0 0 0-16 0" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <span>Login</span>
            </a>
            {% endif %}

            <a href="{% url 'carrinho' %}" class="icon-btn" aria-label="Abrir carrinho">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <div class="badge">{{ cart_item_count }}</div>
            </a>
        </div>
    </div>
</header>
